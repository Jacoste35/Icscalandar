<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>INTER COLIS SERVICES — Portail RH</title>
  <meta name="theme-color" content="#14427e" />
  <meta name="color-scheme" content="light" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <!-- iOS : application plein écran à l'ajout sur l'écran d'accueil -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Inter Colis" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <!-- Écran de démarrage (splash) : styles critiques en ligne pour qu'il
       s'affiche immédiatement, avant même le chargement de la feuille de style. -->
  <style>
    html, body { margin: 0; }
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(120% 90% at 50% 0%, #1b558f 0%, #14427e 45%, #0e2747 100%);
      transition: opacity .55s ease, visibility .55s ease;
    }
    #splash.hide { opacity: 0; visibility: hidden; }
    .splash-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 24px; }
    .splash-logo {
      width: 116px; height: 116px; border-radius: 28px; background: #fff; padding: 14px;
      object-fit: contain; box-shadow: 0 24px 60px -18px rgba(0,0,0,.55);
      animation: splashPulse 1.7s ease-in-out infinite;
    }
    .splash-name {
      color: #fff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 800; letter-spacing: .14em; font-size: .92rem; opacity: .94; text-align: center;
    }
    .splash-bar { width: 168px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.18); overflow: hidden; }
    .splash-bar > span { display: block; height: 100%; width: 42%; border-radius: 999px; background: #e8504d; animation: splashSlide 1.15s ease-in-out infinite; }
    @keyframes splashPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes splashSlide { 0% { margin-left: -42%; } 100% { margin-left: 100%; } }
    @media (prefers-reduced-motion: reduce) { .splash-logo, .splash-bar > span { animation: none; } }
  </style>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/img/icon-192.png" />
</head>
<body>
  <!-- Splash d'ouverture façon application : logo de l'entreprise pendant que
       le portail se charge en arrière-plan. Retiré dès que l'app a rendu. -->
  <div id="splash" role="status" aria-label="Chargement de l'application">
    <div class="splash-inner">
      <img src="/img/icon-512.png" alt="Inter Colis Services" class="splash-logo" />
      <div class="splash-name">INTER COLIS SERVICES</div>
      <div class="splash-bar"><span></span></div>
    </div>
  </div>
  <div id="app">
    <div class="boot">Chargement…</div>
  </div>
  <div id="toast-container"></div>
  <script>
    // Gestion du splash : on le retire dès que l'application a affiché son
    // premier écran (sinon repli automatique), avec une durée minimale pour un
    // effet « ouverture d'app » propre.
    (function () {
      var t0 = Date.now();
      function hide() {
        var s = document.getElementById('splash');
        if (!s || s.classList.contains('hide')) return;
        var wait = Math.max(0, 550 - (Date.now() - t0));
        setTimeout(function () {
          s.classList.add('hide');
          setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 650);
        }, wait);
      }
      window.hideSplash = hide;
      var app = document.getElementById('app');
      if (app && 'MutationObserver' in window) {
        var obs = new MutationObserver(function () {
          if (!app.querySelector('.boot')) { hide(); obs.disconnect(); }
        });
        obs.observe(app, { childList: true, subtree: true });
      }
      setTimeout(hide, 8000); // garde-fou : ne jamais rester bloqué
    })();
  </script>
  <script src="/js/reglement.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/geoloc.js"></script>
  <script>
    // Enregistrement du service worker (installation comme application + hors-ligne).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
