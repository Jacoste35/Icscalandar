# Reverse-proxy nginx pour INTER COLIS SERVICES
# Copier dans : /etc/nginx/sites-available/inter-colis
# Activer :  sudo ln -s /etc/nginx/sites-available/inter-colis /etc/nginx/sites-enabled/
# Tester :   sudo nginx -t && sudo systemctl reload nginx
# Puis HTTPS gratuit :  sudo certbot --nginx -d portail.votre-domaine.fr

server {
    listen 80;
    server_name portail.votre-domaine.fr;   # <-- votre (sous-)domaine OVH

    # Taille max des requêtes (export, etc.)
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;     # port interne de l'app (PORT du .env)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
